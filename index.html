<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earfultime CV Template</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --earful-blue: #42a5fd;
            --earful-brown: #53371e;
            --earful-bg: #fefaf9;
            --earful-lblue: #bad9eb;
            --earful-tan: #cfb59e;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif !important;
            background-color: var(--earful-bg);
            color: var(--earful-brown);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        * { font-family: Arial, Helvetica, sans-serif !important; }
        .font-playful { font-weight: 900; }
        
        .cv-shadow { box-shadow: 0 40px 80px -20px rgba(83, 55, 30, 0.25); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--earful-lblue); border-radius: 10px; }
        
        .cv-container {
            width: 210mm;
            height: 297mm;
            background: white;
            flex-shrink: 0;
        }

        @media (max-width: 1023px) {
            .preview-scale {
                transform: scale(0.35);
                transform-origin: top center;
                margin-bottom: -190mm;
            }
        }
        
        @media (min-width: 1024px) {
            .preview-scale {
                transform: scale(0.75);
                transform-origin: top center;
            }
        }

        .section-box { min-width: max-content; }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        earful: {
                            blue: '#42a5fd', brown: '#53371e', bg: '#fefaf9', lblue: '#bad9eb', tan: '#cfb59e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const Icon = ({ name, className }) => {
            const icons = {
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.18-2.18a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>,
                mail: <><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>,
                instagram: <><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [data, setData] = useState({
                name: "", photo: null, phone: "", email: "", social: "", address: "",
                birthInfo: "", gender: "", status: "", skills: [], 
                education: [], experience: []
            });

            const fileInputRef = useRef(null);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const size = 1200; 
                        canvas.width = size; canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        const min = Math.min(img.width, img.height);
                        ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                        setData({ ...data, photo: canvas.toDataURL('image/jpeg', 0.9) });
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const downloadHD = async () => {
                const node = document.getElementById('cv-output');
                if (!node) return;
                window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#42a5fd'] });
                try {
                    const dataUrl = await htmlToImage.toPng(node, { pixelRatio: 2.5, cacheBust: true });
                    const link = document.createElement('a');
                    link.download = `CV_EARFULTIME_${data.name || 'USER'}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch (e) { console.error(e); }
            };

            return (
                <div className="flex flex-col lg:flex-row h-screen overflow-hidden bg-earful-bg">
                    {/* EDITOR */}
                    <div className="w-full lg:w-[450px] bg-white border-r border-earful-lblue p-6 overflow-y-auto custom-scrollbar z-30 shadow-2xl">
                        <h1 className="text-3xl font-black text-earful-blue mb-10 uppercase tracking-tighter">BUAT CV EARFULTIME</h1>
                        
                        <div className="space-y-6 pb-32">
                            <section>
                                <label className="text-[10px] font-black text-earful-tan uppercase">Foto Profil</label>
                                <div onClick={() => fileInputRef.current?.click()} className="mt-2 w-28 h-28 rounded-[2rem] bg-earful-bg border-4 border-dashed border-earful-lblue flex items-center justify-center cursor-pointer overflow-hidden">
                                    {data.photo ? <img src={data.photo} className="w-full h-full object-cover" /> : <Icon name="camera" className="text-earful-lblue w-10 h-10" />}
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleImage} accept="image/*" />
                            </section>

                            <Input label="Nama Lengkap" value={data.name} ph="GWEH CAKEP" onChange={v => setData({...data, name: v})} />
                            <Input label="Tempat, Tgl Lahir" value={data.birthInfo} ph="MARS, 1 JAN 2077" onChange={v => setData({...data, birthInfo: v})} />
                            <Input label="Gender" value={data.gender} ph="SETENGAH MATANG" onChange={v => setData({...data, gender: v})} />
                            <Input label="Status" value={data.status} ph="LAGI STRESS" onChange={v => setData({...data, status: v})} />
                            <Input label="Alamat" value={data.address} multiline ph="JL. BUNTU NO. 404" onChange={v => setData({...data, address: v})} />
                            
                            <div className="pt-6 border-t border-dashed border-earful-lblue space-y-4">
                                <h3 className="font-bold text-earful-blue uppercase">KONTAK</h3>
                                <Input label="No Telepon" value={data.phone} ph="08XX-XXX-XXX-XX" onChange={v => setData({...data, phone: v})} />
                                <Input label="Email" value={data.email} ph="HALO@EARFULTIME.COM" onChange={v => setData({...data, email: v})} />
                                <Input label="Instagram" value={data.social} ph="@EARFULTIME" onChange={v => setData({...data, social: v})} />
                            </div>

                            <ListGroup title="KEAHLIAN" count={data.skills.length} onAdd={() => setData({...data, skills: [...data.skills, ""]})}>
                                {data.skills.map((s, i) => (
                                    <div key={i} className="flex gap-2">
                                        <input className="flex-1 p-3 bg-earful-bg rounded-xl border text-sm" value={s} onChange={e => {
                                            const n = [...data.skills]; n[i] = e.target.value; setData({...data, skills: n});
                                        }} placeholder="Skill?" />
                                        <button onClick={() => { const n = [...data.skills]; n.splice(i, 1); setData({...data, skills: n}); }} className="text-red-400 font-bold">×</button>
                                    </div>
                                ))}
                            </ListGroup>

                            <ListGroup title="PENDIDIKAN" onAdd={() => setData({...data, education: [...data.education, {id: Date.now(), y: "2020-2024", s: "NAMA SEKOLAH"}]})}>
                                {data.education.map((edu, i) => (
                                    <div key={edu.id} className="p-3 bg-earful-bg rounded-xl border space-y-2">
                                        <input className="w-full text-xs font-bold" value={edu.y} onChange={e => {
                                            const n = [...data.education]; n[i].y = e.target.value; setData({...data, education: n});
                                        }} />
                                        <input className="w-full text-sm" value={edu.s} onChange={e => {
                                            const n = [...data.education]; n[i].s = e.target.value; setData({...data, education: n});
                                        }} />
                                        <button onClick={() => { const n = [...data.education]; n.splice(i, 1); setData({...data, education: n}); }} className="text-xs text-red-500 underline">Hapus</button>
                                    </div>
                                ))}
                            </ListGroup>

                            <ListGroup title="PENGALAMAN" onAdd={() => setData({...data, experience: [...data.experience, {id: Date.now(), y: "2024", c: "PT APA", p: "POSISI"}]})}>
                                {data.experience.map((exp, i) => (
                                    <div key={exp.id} className="p-3 bg-earful-bg rounded-xl border space-y-2">
                                        <input className="w-full text-xs font-bold" value={exp.y} onChange={e => {
                                            const n = [...data.experience]; n[i].y = e.target.value; setData({...data, experience: n});
                                        }} />
                                        <input className="w-full text-sm font-black" value={exp.c} onChange={e => {
                                            const n = [...data.experience]; n[i].c = e.target.value; setData({...data, experience: n});
                                        }} />
                                        <input className="w-full text-xs italic" value={exp.p} onChange={e => {
                                            const n = [...data.experience]; n[i].p = e.target.value; setData({...data, experience: n});
                                        }} />
                                        <button onClick={() => { const n = [...data.experience]; n.splice(i, 1); setData({...data, experience: n}); }} className="text-xs text-red-500 underline">Hapus</button>
                                    </div>
                                ))}
                            </ListGroup>
                        </div>
                    </div>

                    {/* PREVIEW */}
                    <div className="flex-1 overflow-y-auto p-8 flex flex-col items-center">
                        <button onClick={downloadHD} className="sticky top-0 z-50 mb-10 px-12 py-5 bg-earful-blue text-white font-black rounded-full shadow-2xl uppercase">DOWNLOAD PNG</button>
                        
                        <div className="preview-scale">
                            <div id="cv-output" className="cv-container rounded-[3.5rem] overflow-hidden flex flex-row cv-shadow bg-white">
                                <div className="w-[38%] bg-earful-blue p-12 flex flex-col items-center text-white">
                                    <div className="w-48 h-48 rounded-[3.2rem] border-4 border-white overflow-hidden mb-12 transform -rotate-3">
                                        {data.photo && <img src={data.photo} className="w-full h-full object-cover" />}
                                    </div>
                                    <h1 className="text-3xl font-black text-center uppercase tracking-tighter mb-16">{data.name || "GWEH CAKEP"}</h1>
                                    
                                    <div className="w-full space-y-8">
                                        <div className="bg-white text-earful-blue py-2 rounded-2xl text-center font-black uppercase shadow-inner">KONTAK</div>
                                        <PreviewIcon name="phone" text={data.phone} ph="08XX-XXX-XXX-XX" />
                                        <PreviewIcon name="mail" text={data.email} ph="HALO@EARFULTIME.COM" />
                                        <PreviewIcon name="instagram" text={data.social} ph="@EARFULTIME" />
                                    </div>

                                    <div className="w-full mt-16">
                                        <div className="bg-white text-earful-blue py-2 rounded-2xl text-center font-black uppercase mb-8 shadow-inner">KEAHLIAN</div>
                                        <div className="space-y-4 px-4">
                                            {data.skills.map((s, i) => (
                                                <div key={i} className="flex gap-4 items-center font-bold">
                                                    <div className="w-2.5 h-2.5 rounded-full bg-white shrink-0" />
                                                    <span className="uppercase text-sm">{s}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-1 p-16 relative flex flex-col">
                                    <SectionHeader num="1" title="DATA PRIBADI" />
                                    <div className="pl-16 mb-12 space-y-4">
                                        <DataRow label="NAMA" val={data.name} ph="SI PALING KREATIF" />
                                        <DataRow label="TEMPAT, TGL LAHIR" val={data.birthInfo} ph="MARS, 1 JAN 2077" />
                                        <DataRow label="JENIS KELAMIN" val={data.gender} ph="SETENGAH MATANG" />
                                        <DataRow label="STATUS" val={data.status} ph="LAGI STRESS" />
                                        <DataRow label="ALAMAT" val={data.address} ph="JL. BUNTU NO. 404" />
                                    </div>

                                    <SectionHeader num="2" title="RIWAYAT PENDIDIKAN" />
                                    <div className="pl-16 mb-12 space-y-6">
                                        {data.education.map(edu => (
                                            <div key={edu.id} className="relative">
                                                <div className="absolute -left-8 top-1.5 w-2.5 h-2.5 rounded-full bg-earful-lblue" />
                                                <div className="text-[10px] font-black text-earful-tan uppercase">{edu.y}</div>
                                                <div className="text-lg font-bold text-earful-brown uppercase leading-tight">{edu.s}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <SectionHeader num="3" title="PENGALAMAN KERJA" />
                                    <div className="pl-16 space-y-6">
                                        {data.experience.map(exp => (
                                            <div key={exp.id} className="relative">
                                                <div className="absolute -left-8 top-1.5 w-2.5 h-2.5 rounded-full bg-earful-tan" />
                                                <div className="text-[10px] font-black text-earful-tan uppercase">{exp.y}</div>
                                                <div className="text-lg font-black text-earful-blue uppercase leading-tight">{exp.c}</div>
                                                <div className="text-xs italic font-bold text-earful-brown">({exp.p})</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Input = ({ label, value, onChange, ph, multiline }) => (
            <div className="space-y-1">
                <label className="text-[10px] font-black text-earful-tan uppercase tracking-widest">{label}</label>
                {multiline ? (
                    <textarea value={value} className="w-full p-3 bg-earful-bg border border-earful-lblue rounded-2xl text-sm outline-none resize-none h-20" onChange={e => onChange(e.target.value)} placeholder={ph} />
                ) : (
                    <input value={value} className="w-full p-3 bg-earful-bg border border-earful-lblue rounded-2xl text-sm outline-none" onChange={e => onChange(e.target.value)} placeholder={ph} />
                )}
            </div>
        );

        const ListGroup = ({ title, count, onAdd, children }) => (
            <div className="pt-6 border-t border-dashed border-earful-lblue space-y-4">
                <div className="flex justify-between items-center">
                    <h3 className="font-bold text-earful-blue uppercase text-sm">{title}</h3>
                    <button onClick={onAdd} className="w-7 h-7 rounded-full bg-earful-blue text-white font-bold">+</button>
                </div>
                {children}
            </div>
        );

        const PreviewIcon = ({ name, text, ph }) => (
            <div className="flex items-center gap-5">
                <div className="w-10 h-10 rounded-2xl bg-white/10 flex items-center justify-center border border-white/5 shrink-0">
                    <Icon name={name} className="w-4 h-4 text-white" />
                </div>
                <span className={`text-sm font-bold truncate ${!text ? 'text-white/20 italic' : 'text-white'}`}>{text || ph}</span>
            </div>
        );

        const SectionHeader = ({ num, title }) => (
            <div className="flex items-center gap-5 mb-8">
                <div className="w-10 h-10 rounded-full bg-earful-blue text-white flex items-center justify-center font-black text-lg transform -rotate-12">{num}</div>
                <div className="section-box px-8 py-2 bg-earful-blue rounded-r-full rounded-tl-full text-white font-black text-lg uppercase tracking-tight">{title}</div>
            </div>
        );

        const DataRow = ({ label, val, ph }) => (
            <div className="flex flex-col">
                <span className="text-[10px] font-black text-earful-tan uppercase">{label} :</span>
                <span className={`text-xl font-bold uppercase leading-tight ${!val ? 'text-earful-tan/20 italic' : 'text-earful-brown'}`}>{val || ph}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
